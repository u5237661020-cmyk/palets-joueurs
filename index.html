<script>
// Chargement des données : on tente d'abord data.json à côté de index.html (GitHub Pages),
// puis l'URL absolue du dépôt. Cela évite les problèmes si l'app est servie depuis un domaine différent.
const params = new URLSearchParams(window.location.search);
const ABS_DATA_URL = 'https://u5237661020-cmyk.github.io/palets-joueurs/data.json';
const LOCAL_DATA_URL = new URL('data.json', window.location.href).href;
const RAW_DATA_URL = 'https://raw.githubusercontent.com/u5237661020-cmyk/palets-joueurs/main/data.json';
const DATA_URLS = [...new Set([LOCAL_DATA_URL, ABS_DATA_URL, RAW_DATA_URL])];

let data = null;
let myTeam = localStorage.getItem('palets-my-team') || null;
let myTeamName = localStorage.getItem('palets-my-team-name') || null;
let currentTab = 'my';
let lastMatchKey = localStorage.getItem('palets-last-match') || null;
let lastNotifId = null; // Reset à chaque chargement - on remontre les notifs récentes
let notifGranted = ('Notification' in window) && Notification.permission === 'granted';
let refreshing = false;

window.addEventListener('load', () => {
  if(myTeam) updateMyTeamBtn();

  // Service worker OneSignal conservé : nécessaire aux vraies notifications push hors appli.

  loadData().then(() => {
    if(!myTeam && data && data.standings && data.standings.length > 0) {
      setTimeout(() => openPicker(), 300);
    }
  });
  // Polling plus rapide pour éviter l'attente au démarrage et pendant les saisies de scores.
  setTimeout(loadData, 1200);
  setTimeout(loadData, 3500);
  setInterval(()=>{ if(!document.hidden) loadData(); }, 6000);
  setInterval(loadData, 20000);
});

async function fetchJsonWithTimeout(url, timeoutMs=4500){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);
  try{
    const sep = url.includes('?') ? '&' : '?';
    const r = await fetch(url + sep + '_=' + Date.now(), {cache:'no-store', signal:controller.signal});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }finally{ clearTimeout(timer); }
}

async function loadData(){
  if(refreshing) return;
  refreshing = true;
  const el = document.getElementById('content');
  const cached = localStorage.getItem('palets-data-cache');
  if(cached && !data){
    try{ data=JSON.parse(cached); updateHeader(); render(); checkNotifMessages(); }
    catch(e){ localStorage.removeItem('palets-data-cache'); }
  }

  const attempts = DATA_URLS.map(url =>
    fetchJsonWithTimeout(url, 3000).then(fresh => fresh).catch(()=>null)
  );
  try{
    const results = await Promise.allSettled(attempts);
    const fresh = chooseNewestData(results.map(r=>r.status==='fulfilled'?r.value:null));
    if(!fresh || typeof fresh !== 'object') throw new Error('JSON invalide');

    // Important : on n'écrase jamais l'affichage avec une version plus ancienne.
    // GitHub Pages / raw peuvent parfois répondre avec un léger décalage : c'était la cause des scores qui apparaissaient puis disparaissaient.
    const currentVersion = dataVersionValue(data);
    const freshVersion = dataVersionValue(fresh);
    if(data && freshVersion && currentVersion && freshVersion < currentVersion){
      checkNotifMessages();
      return;
    }

    const changed = JSON.stringify(fresh)!==JSON.stringify(data);
    data=fresh;
    try{ localStorage.setItem('palets-data-cache',JSON.stringify(fresh)); }catch(e){}
    updateHeader();
    if(changed||!el.children.length) render();
    if(changed) checkNotification();
    checkNotifMessages();
    if(!myTeam&&fresh.standings?.length>0) setTimeout(()=>openPicker(),250);
  }catch(e){
    if(!data){
      el.innerHTML='<div class="empty">⚠️ Aucune donnée publiée<br><small style="color:#4a7090">Vérifiez que le fichier <strong>data.json</strong> existe dans le dépôt GitHub Pages.</small><br><br><button class="btn" style="max-width:220px;margin:12px auto" onclick="localStorage.removeItem(\'palets-data-cache\');location.reload()">🔄 Recharger</button></div>';
    }
  }finally{
    refreshing = false;
  }
}

function dataVersionValue(d){
  if(!d) return 0;
  if(typeof d.version === 'number') return d.version;
  const t = d.updatedAt ? Date.parse(d.updatedAt) : 0;
  return Number.isFinite(t) ? t : 0;
}
function chooseNewestData(items){
  const valid = items.filter(x=>x && typeof x === 'object');
  if(!valid.length) return null;
  valid.sort((a,b)=>dataVersionValue(b)-dataVersionValue(a));
  return valid[0];
}

function withOneSignal(cb){
  return new Promise(resolve=>{
    if(!window.OneSignalDeferred){ resolve(null); return; }
    window.OneSignalDeferred.push(async function(OneSignal){
      try{ resolve(await cb(OneSignal)); }catch(e){ console.warn('OneSignal', e); resolve(null); }
    });
  });
}
async function syncOneSignalTags(){
  if(!myTeam) return false;
  return await withOneSignal(async (OneSignal)=>{
    await OneSignal.User.addTags({team_id:String(myTeam), team_name:myTeamName||'', tournoi:'rsg'});
    return true;
  });
}

async function requestNotif(){
  const osResult = await withOneSignal(async (OneSignal)=>{
    const granted = await OneSignal.Notifications.requestPermission();
    await syncOneSignalTags();
    return !!granted || OneSignal.Notifications.permission === true;
  });
  if(osResult!==null){ notifGranted=!!osResult || (('Notification' in window) && Notification.permission==='granted'); render(); return notifGranted; }
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted'){ notifGranted=true; await syncOneSignalTags(); render(); return true; }
  if(Notification.permission==='denied'){ tryResetNotif(); return false; }
  const p = await Notification.requestPermission();
  notifGranted = p === 'granted';
  if(notifGranted) await syncOneSignalTags();
  render(); return notifGranted;
}

function sendNotif(title, body){
  if(!notifGranted) return;

function checkNotification(){
  if(!myTeamName || !data) return;
  const m = getCurrentMyMatch();
  if(m){ const k='p'+data.round+'-'+m.planche; if(k!==lastMatchKey){ lastMatchKey=k; localStorage.setItem('palets-last-match',k); sendNotif('Nouveau match — '+myTeamName,'Partie '+data.round+' · Planche '+m.planche+' vs '+(m.t1===myTeamName?m.t2:m.t1)); } }
  const n = getNextMyMatch();
  if(n){ const k='next-p'+(parseInt(data.round)+1)+'-'+n.planche; if(k!==lastMatchKey){ lastMatchKey=k; localStorage.setItem('palets-last-match',k); sendNotif('Prochain match — '+myTeamName,'Partie '+(parseInt(data.round)+1)+' · Planche '+n.planche+' vs '+(n.t1===myTeamName?n.t2:n.t1)); } }
}

function checkNotifMessages(){
  if(!data || !data.notifications){ return; }
  console.log('[Notif] données notif trouvées:', data.notifications.type, data.notifications.timestamp);
  const notif = data.notifications;
  const notifKey = notif.timestamp + '_' + notif.type;
  if(notifKey === lastNotifId) return; // Déjà vue
  lastNotifId = notifKey;
  // localStorage.setItem('palets-last-notif', notifKey); // Désactivé pour re-montrer à chaque session
  // Trouver le message de cette équipe
  // teamId peut être number ou string selon la source
  const myMsg = notif.messages?.find(m => String(m.teamId) === String(myTeam));
  if(!myMsg){
    console.log('[Notif] Pas de message pour équipe', myTeam, '- messages disponibles:', notif.messages?.map(m=>m.teamId));
    return;
  }
  // Afficher bannière in-app
  showNotifBanner(myMsg.text, myMsg.long, notif.type);
  // Notification push si accordée
  if(notifGranted){
    const titles = {
      debut: '🎉 Tournoi RSG — Ça commence !',
      prochain: '🥏 Prochain match',
      classement: '📊 Classement mis à jour',
      fin: '👋 Tournoi terminé !'
    };
    sendNotif(titles[notif.type] || '🥏 RSG', myMsg.text.substring(0, 100));
  }
}

  if(historyToShow.length > 0){
    h+=`<div style="font-family:'Bebas Neue',cursive;color:#4a7090;font-size:12px;letter-spacing:.1em;margin:10px 0 6px;padding-left:2px">PARTIES PRÉCÉDENTES</div>`;
    historyToShow.forEach(m=>{
      const isT1=m.t1===myTeamName,opp=isT1?m.t2:m.t1;
      const myScore=isT1?m.score1:m.score2,oppScore=isT1?m.score2:m.score1;
      const hasScore=myScore!==''&&myScore!=null&&oppScore!==''&&oppScore!=null;
      const won=hasScore&&parseFloat(myScore)>parseFloat(oppScore);
      const lost=hasScore&&parseFloat(myScore)<parseFloat(oppScore);
      h+=`<div class="card" style="border-color:${won?'#22c55e44':lost?'#ef444444':'#1e3a5a'};padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-family:'Bebas Neue',cursive;font-size:13px;color:#4a7090">PARTIE ${m.round} · PLANCHE ${m.planche}</span>
          ${hasScore?`<span style="font-family:'Bebas Neue',cursive;font-size:18px;color:${won?'#22c55e':lost?'#ef4444':'#e2eaff'}">${myScore} — ${oppScore}</span>`:'<span style="font-size:11px;color:#4a7090">—</span>'}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;font-family:'Bebas Neue',cursive;font-size:15px;color:#a855f7">${myTeamName}</div>
          <div style="color:#4a7090;font-size:11px;flex-shrink:0">vs</div>
          <div style="flex:1;text-align:right;font-family:'Bebas Neue',cursive;font-size:15px;color:#e2eaff">${opp}</div>
        </div>
      </div>`;
    });
  }

  el.innerHTML = h;
}


function renderMatchs(){
  const matches=data?.currentMatches||[];
  if(!matches.length){ document.getElementById('content').innerHTML='<div class="empty">🎲<br>Le tirage n\'a pas encore été effectué.</div>'; return; }
  let h=`<div class="gf" style="color:#4a7090;font-size:12px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em">PARTIE ${data.round} — MATCHS EN COURS</div>`;
  matches.sort((a,b)=>a.planche-b.planche).forEach(m=>{
    const isMe=m.t1===myTeamName||m.t2===myTeamName,hasScore=m.score1!==''&&m.score1!=null&&m.score2!==''&&m.score2!=null;
    h+=`<div class="${isMe?'card-my':'card'}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="badge-gold">PLANCHE ${m.planche}</span>${isMe?'<span class="badge-me">Mon équipe</span>':''}${hasScore?`<span class="badge" style="font-size:18px;font-family:'Bebas Neue',cursive;padding:3px 14px;letter-spacing:2px">${m.score1} — ${m.score2}</span>`:'<span style="font-size:11px;color:#4a7090">En cours</span>'}</div><div class="vs-row"><div class="team-box ${m.t1===myTeamName?'me':''}">${m.t1}</div><div style="color:#eab308;font-family:'Bebas Neue',cursive;font-size:16px;flex-shrink:0">VS</div><div class="team-box ${m.t2===myTeamName?'me':''}">${m.t2}</div></div></div>`;
  });
  document.getElementById('content').innerHTML=h;
}

function renderClassement(){
  const st=data?.standings||[];
  if(!st.length){ document.getElementById('content').innerHTML='<div class="empty">🏆<br>Classement disponible après la première partie.</div>'; return; }
  const medal=['🥇','🥈','🥉'];
  let h='<div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th style="width:36px">Rg</th><th style="text-align:left">Équipe</th><th>V</th><th>D</th><th>G.A.</th></tr></thead><tbody>';
  st.forEach((t,i)=>{
    const ga=t.pour-t.contre,isMe=String(t.id)===myTeam,rc=i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
    h+=`<tr class="${rc}${isMe?' me':''}"><td style="text-align:center;font-family:'Bebas Neue',cursive;font-size:16px;color:#eab308">${medal[i]||t.rank}</td><td style="font-weight:700${isMe?';color:#a855f7':''}">${t.name}${isMe?' <span class="badge-me" style="font-size:10px">Moi</span>':''}</td><td style="text-align:center;color:#22c55e;font-weight:700">${t.wins}</td><td style="text-align:center;color:#ef4444">${t.losses}</td><td style="text-align:center;color:${ga>=0?'#22c55e':'#ef4444'}">${ga>0?'+'+ga:ga}</td></tr>`;
  });
  h+='</tbody></table></div>';
  document.getElementById('content').innerHTML=h;
}

function renderProchains(){
  const matches=data?.nextMatches||[];
  if(!matches.length){ document.getElementById('content').innerHTML='<div class="empty">🎯<br>Prochains matchs disponibles après le tirage.</div>'; return; }
  let h=`<div class="gf" style="color:#4a7090;font-size:12px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em">PARTIE ${parseInt(data.round)+1} — PROCHAINS MATCHS</div>`;
  matches.sort((a,b)=>a.planche-b.planche).forEach(m=>{
    const isMe=m.t1===myTeamName||m.t2===myTeamName;
    h+=`<div class="${isMe?'card-my':'card'}"><div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><span class="badge-blue">PLANCHE ${m.planche}</span>${isMe?'<span class="badge-me">Mon équipe</span>':''}</div><div class="vs-row"><div class="team-box ${m.t1===myTeamName?'me':''}">${m.t1}</div><div style="color:#3b82f6;font-family:'Bebas Neue',cursive;font-size:16px;flex-shrink:0">VS</div><div class="team-box ${m.t2===myTeamName?'me':''}">${m.t2}</div></div></div>`;
  });
  document.getElementById('content').innerHTML=h;
}
</script>

<script>
// ── Bannière installation PWA (Android Chrome) ──
let deferredPrompt = null;

// Détecter iOS Safari
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandaloneMode = window.navigator.standalone === true;
const isAndroid = /android/i.test(navigator.userAgent);

const installBar = document.createElement('div');
installBar.id = 'install-bar';
installBar.style.cssText = 'display:none;position:fixed;bottom:80px;left:12px;right:12px;background:#172438;border:1px solid #eab30866;border-radius:12px;padding:12px 16px;z-index:300;box-shadow:0 4px 20px #000a';
document.body.appendChild(installBar);

function showInstallBar(content){
  installBar.innerHTML = content;
  installBar.style.display = 'block';
  setTimeout(()=>{ installBar.style.display='none'; }, 15000);
}

// iOS : afficher instructions manuelles après 3s si pas installé
if(isIOS && !isInStandaloneMode){
  // Afficher bannière iOS à chaque ouverture (pas seulement 1 fois)
  // Car les joueurs ont besoin des instructions pour installer
  setTimeout(()=>{
    installBar.style.cssText = 'display:block;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#0e1828,#172438);border-top:3px solid #eab308;padding:16px;z-index:1000;box-shadow:0 -4px 20px #000c';
    installBar.innerHTML = `
      <div style="max-width:500px;margin:0 auto">
        <div style="font-family:'Bebas Neue',cursive;color:#eab308;font-size:18px;margin-bottom:8px;text-align:center">
          📲 INSTALLER L'APPLI PALETS RSG
        </div>
        <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:10px">
          <div style="background:#172438;border:1px solid #1e3a5a;border-radius:8px;padding:8px 14px;text-align:center;flex:1;font-size:13px;color:#e2eaff;line-height:1.7">
            1️⃣ Appuyer sur<br><strong style="color:#eab308">⎋ Partager</strong><br>en bas de l'écran
          </div>
          <div style="color:#4a7090;font-size:20px">→</div>
          <div style="background:#172438;border:1px solid #1e3a5a;border-radius:8px;padding:8px 14px;text-align:center;flex:1;font-size:13px;color:#e2eaff;line-height:1.7">
            2️⃣ Choisir<br><strong style="color:#eab308">"Sur l'écran<br>d'accueil"</strong>
          </div>
          <div style="color:#4a7090;font-size:20px">→</div>
          <div style="background:#172438;border:1px solid #1e3a5a;border-radius:8px;padding:8px 14px;text-align:center;flex:1;font-size:13px;color:#e2eaff;line-height:1.7">
            3️⃣ Appuyer<br><strong style="color:#22c55e">"Ajouter"</strong><br>✅ Installé !
          </div>
        </div>
        <button onclick="installBar.style.display='none'" style="display:block;width:100%;background:#eab308;color:#000;border:none;border-radius:8px;padding:10px;font-family:'Bebas Neue',cursive;font-size:16px;cursor:pointer">
          J'AI COMPRIS — FERMER
        </button>
      </div>
    `;
  }, 2000);
}

// Android : bannière native
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBar(`
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">🥏</div>
      <div style="flex:1">
        <div style="font-family:'Bebas Neue',cursive;color:#eab308;font-size:16px">INSTALLER L'APPLI</div>
        <div style="font-size:12px;color:#4a7090">Accès rapide depuis l'écran d'accueil</div>
      </div>
      <button id="install-btn" style="background:#eab308;color:#000;border:none;border-radius:8px;padding:8px 14px;font-family:'Bebas Neue',cursive;font-size:14px;cursor:pointer">INSTALLER</button>
      <button onclick="installBar.style.display='none'" style="background:none;border:none;color:#4a7090;font-size:20px;cursor:pointer;padding:4px">✕</button>
    </div>
  `);
  document.getElementById('install-btn')?.addEventListener('click', async () => {
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBar.style.display = 'none';
  });
});

window.addEventListener('appinstalled', () => { installBar.style.display='none'; });
</script>
</body>
</html>
